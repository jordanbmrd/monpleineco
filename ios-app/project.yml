name: MonPleinEco
options:
  bundleIdPrefix: fr.monpleineco
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: 2
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: MonPleinEco/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 11.10.0

targets:
  MonPleinEco:
    type: application
    platform: iOS
    sources:
      - path: MonPleinEco
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.monpleineco.ios
        DEVELOPMENT_TEAM: ""
